- name: demo on variables
  hosts: all
  become: true  
  vars:
    name: "ansible"
    version: "2.14"
    URL: "https://www.ansible.com/"
  tasks:
    - name: print the variables
      debug:
        msg: "The name is {{ name }}, the version is {{ version }}, and the URL is {{ URL }}"

    - name: local variables
      vars: 
        local_name: "local variable"
        debug:
          msg: "The local name is {{ local_name }}"
- name: print the global variable
  hosts: all
  become: true
  vars:
    version: "ansible version"
  tasks:
    - name: print the global variable
      ansible.builtin_shell: "ansible --version"
      register: version_output
  debug:
    msg: "The version is {{ version_output.stdout }}"
